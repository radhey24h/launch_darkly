services:

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    networks:
      - poc-network

  python-middleware:
    build:
      context: .
      dockerfile: src/PythonMiddleware/Dockerfile
    container_name: python-middleware
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - poc-network

  dotnet-middleware:
    build:
      context: .
      dockerfile: src/DotNetMiddleware/Dockerfile
    container_name: dotnet-middleware
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - poc-network

  message-worker:
    build:
      context: .
      dockerfile: src/MessageWorker/Dockerfile
    container_name: message-worker
    environment:
      # RabbitMQ and middleware URLs differ inside Docker (service names, not localhost).
      # The LaunchDarkly SdkKey is read from appsettings.json baked into the image.
      # Edit src/MessageWorker/appsettings.json before running docker compose up --build.
      RabbitMq__Host: rabbitmq
      Middleware__Python__BaseUrl: http://python-middleware:8000
      Middleware__DotNet__BaseUrl: http://dotnet-middleware:8080
    depends_on:
      rabbitmq:
        condition: service_healthy
      python-middleware:
        condition: service_healthy
      dotnet-middleware:
        condition: service_healthy
    networks:
      - poc-network

  xml-producer:
    build:
      context: .
      dockerfile: src/XmlProducer/Dockerfile
    container_name: xml-producer
    environment:
      # Only the host differs inside Docker; all other values come from appsettings.json.
      RabbitMq__Host: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - poc-network

networks:
  poc-network:
    driver: bridge
